const SYSTEM_B = {

    { id:"authentic_material", label:"Authentic Material",   icon:"ti-file-text",    desc:"Article / video / podcast → complete task sequence",  types:["Authentic Material Workbook"] },

const SYSTEM_C = {

const CEFR      = ["A1","A2","B1","B2","C1","C2"];
const SKILLS    = ["Speaking","Listening","Reading","Writing","Grammar","Vocabulary","Pronunciation"];
const EXAMS     = ["IELTS","TOEFL","Cambridge B2 First","Cambridge C1 Advanced","Cambridge C2 Proficiency","OET","TOEIC","PTE Academic","DELE","DELF"];

const AUTHENTICITY_OPTIONS = [
  "Стиль реального издания","Реалистичные имена и места","Региональный вариант языка",
  "Актуальный год / даты","Брендинг и логотипы","Разговорный / неформальный тон",
  "Официальный / деловой тон","Визуально как скан/фото","Опечатки и неровности как в жизни",
];

function buildMasterSystem(system) {
  const isVisual = system === "A";
  const isSL = system === "C";
  return `You are a senior instructional designer and prompt engineer specializing in foreign language teaching${isVisual ? ", working alongside an AI image-generation specialist" : isSL ? ", with deep expertise in spoken language acquisition for adult 1-to-1 learners" : ""}.

Your ONLY job is to output a single, fully engineered prompt that a teacher will paste into any LLM to receive a complete, ready-to-use educational product in ONE response — no follow-up clarifications needed.

ABSOLUTE RULES:
1. Output ONLY the final prompt. No preamble. No "Here is your prompt:". No explanation. No markdown fences around the whole thing.
2. The prompt you write must be self-contained, over-specified, and leave zero ambiguity for the executing LLM.
3. Think like a senior prompt engineer: identify every gap in the teacher's input and fill it with best-practice pedagogical defaults.
4. The prompt must produce a product that requires zero editing before classroom use.
5. The TARGET LANGUAGE OF INSTRUCTION specified in the input is the language the actual teaching material must be written in. Never default to English unless English is the specified target language.${isVisual ? `
6. This is a VISUAL material (System A). The prompt you output MUST ALWAYS include a fully written, ready-to-use AI IMAGE GENERATION PROMPT as its own clearly labeled section — non-negotiable, never omit it.` : ""}${isSL ? `
6. This is a SPEAKING & LISTENING session (System C). The product must be 100% oral-delivery-ready:
   - NO worksheets, NO written exercises, NO grammar tables, NO fill-in-the-blank tasks.
   - ALL tasks are spoken: teacher asks, student responds, teacher reacts. Everything flows as conversation.
   - Scaffolding = oral cues, question sequences, teacher prompts — not visual or written supports.
   - Grammar emerges from use. Never explained in isolation or shown in a table.
   - Output = a teacher-facing script/plan for any CEFR level, not a student-facing document.` : ""}

YOUR PROMPT MUST ALWAYS INCLUDE THESE SECTIONS:

## ROLE
Assign the executing LLM a precise expert identity (specialist in teaching the target language as a foreign language${isSL ? ", specifically oral acquisition for adult 1-to-1 sessions" : ""}).

## CONTEXT
All learner details: age, CEFR level, profession, interests, goals, strengths, weaknesses, and the target language of instruction.

## OBJECTIVE
A single, measurable, explicit instruction of exactly what to produce${isSL ? " — a fully scripted oral lesson plan for 1-to-1 use" : ""}.

## PEDAGOGICAL REQUIREMENTS
${isSL ? `- Speaking-first, input-rich methodology
- All scaffolding is oral: questions, rephrasing, minimal pairs, teacher echo, concept checking questions (CCQs)
- Comprehensible input pitched just above current level (i+1)
- Lexis introduced through meaning-context, never through lists or translation tables
- Grammar recycled implicitly through repeated communicative use, never explained metalinguistically
- Personalization to student's profession, interests, and real communicative needs
- High frequency of teacher-to-student interaction turns; no long teacher monologues` : `- Communicative approach, TBL where appropriate
- Personalization to student interests/profession/goals
- Retrieval practice, spaced repetition, meaningful interaction
- Authentic language use, no mechanical drills without communicative purpose
- No excessive grammar explanation; focus on use over analysis`}
- CEFR-appropriate lexis, syntax, and task difficulty throughout, calibrated for the target language
${isVisual ? `
## IMAGE GENERATION PROMPT (MANDATORY — NEVER SKIP)
Your engineered prompt must instruct the executing LLM to ALWAYS produce, as a clearly labeled final section, one complete, ready-to-paste AI image-generation prompt (suitable for tools like Midjourney, DALL·E, or similar) that visually matches the educational material being created. This image prompt must:
- Describe subject, composition, exact text/labels to render (if any), color palette, art style, aspect ratio, and mood
- Be tailored to the specific category/subtype of material
- Be fully self-contained — copy-pasteable into an image generator with no further editing
- Reflect any authenticity requirements provided
This image prompt is REQUIRED in every single output, with no exceptions.
` : ""}
## OUTPUT FORMAT
${isSL ? `A teacher-facing oral lesson script with clearly labeled stages and teacher prompts. Each stage must include: goal, approximate timing, exact teacher questions/prompts to say aloud, anticipated student responses, and teacher follow-up moves. No student-facing printed material.` : "Exact section structure with headings, subsections, labels, and timing where applicable."}${isVisual ? ' The "## IMAGE GENERATION PROMPT" section must always be present as the final section.' : ""}

## SELF-CHECK
Require the executing LLM to silently verify before outputting (including a check that all material is in the correct target language${isVisual ? ", and that the mandatory image prompt section is present" : ""}${isSL ? ", and that the output contains zero written student tasks — everything is oral teacher-script only" : ""}), then output the final product without showing the self-check.`;
}

function buildUserMessage({ system, category, subtype, language, fields }) {
  const L = [];
  const sysLabel = system === "A" ? "System A — Teaching Material Generator"
                 : system === "B" ? "System B — Workbook Generator"
                 : "System C — Speaking & Listening";
  L.push(`SYSTEM: ${sysLabel}`);
  L.push(`TARGET LANGUAGE OF INSTRUCTION: ${language?.label || ""} (${language?.native || ""})`);
  L.push(`CATEGORY: ${category}`);
  if (subtype) L.push(`SPECIFIC TYPE: ${subtype}`);
  L.push("","=== LEARNER PROFILE ===");
  if (fields.age)            L.push(`Age: ${fields.age}`);
  if (fields.cefr)           L.push(`CEFR Level: ${fields.cefr}`);
  if (fields.profession)     L.push(`Profession/Background: ${fields.profession}`);
  if (fields.interests)      L.push(`Interests: ${fields.interests}`);
  if (fields.goals)          L.push(`Learning Goals: ${fields.goals}`);
  if (fields.strengths)      L.push(`Strengths: ${fields.strengths}`);
  if (fields.weaknesses)     L.push(`Weaknesses / Recurring errors: ${fields.weaknesses}`);
  L.push("","=== LESSON/TASK CONTEXT ===");
  if (fields.topic)          L.push(`Topic/Theme: ${fields.topic}`);
  L.push(`Session type: ${fields.groupType === "group" ? "Group lesson" : "1-to-1 lesson"}`);
  if (fields.skills?.length > 0) L.push(`Skills Focus: ${fields.skills.join(", ")}`);
  if (fields.languageGoals)  L.push(`Language Goals: ${fields.languageGoals}`);
  if (system === "A") {
    const authParts = [...(fields.authenticity?.selected||[])];
    if (fields.authenticity?.custom) authParts.push(fields.authenticity.custom);
    if (authParts.length) L.push(`Authenticity Requirements: ${authParts.join(", ")}`);
  }
  if (system === "B") {
    if (fields.examTarget)   L.push(`Exam Target: ${fields.examTarget}`);
    if (fields.sourceText)   L.push(`Source Material/Student Sample:\n${fields.sourceText}`);
  }
  if (system === "C") {
    if (fields.sourceText)   L.push(`\n=== SOURCE MATERIAL ===\n${fields.sourceText}`);
    if (fields.errorSamples) L.push(`\n=== STUDENT SPEECH ERRORS (from recent sessions) ===\n${fields.errorSamples}`);
    L.push("","=== SYSTEM C CONSTRAINTS ===");
    L.push("OUTPUT MUST BE: an oral-only teacher script. No student worksheets. No printed tasks. No grammar tables. Grammar woven into spoken interaction only. Works for any CEFR level.");
    if (category === "Нет программы / нет учебника" || category === "Low-Level Oral Lesson") {
      L.push("SCAFFOLDING NOTE: Student may have limited resources (no suitable textbook). Provide maximum oral scaffolding: simple questions, partial sentences for completion, immediate confirmation checks, very short target utterances. Grammar emerges implicitly from repeated oral use only.");
    }
    if (category === "Error Drill") {
      L.push("DRILL NOTE: Design an engaging, game-like oral drill targeting the specific errors listed. No metalanguage unless absolutely necessary. Keep it playful and communicative — not mechanical repetition.");
    }
    if (category === "Разговорный урок" || category === "Conversation Lesson") {
      L.push("CONVERSATION NOTE: Structured discussion with layered questions (factual → opinion → hypothetical). Teacher redirects, challenges, expands. Student does 70% of talking.");
    }
    if (category === "Сторителлинг" || category === "Storytelling Lesson") {
      L.push("STORYTELLING NOTE: Student narrates; teacher guides with prompts, asks clarifying questions, echoes and expands language, introduces new vocabulary through follow-up questions only.");
    }
    if (category === "Ролевая игра" || category === "Roleplay Lesson") {
      L.push("ROLEPLAY NOTE: Realistic scenario simulation. Teacher plays the other role. Include pre-task vocabulary activation (oral only), the roleplay itself, and a brief oral debrief/language focus.");
    }
    if (category === "Лексика через речь" || category === "Lexical Oral Lesson") {
      L.push("LEXICAL NOTE: All vocabulary introduced through meaning-rich oral context. No word lists, no translation. Meaning conveyed through examples, questions, and contrast. Immediate productive use in speech.");
    }
  }
  if (fields.additionalNotes) { L.push("","=== ADDITIONAL NOTES ===", fields.additionalNotes); }
  if (system === "A") {
    L.push("","=== MANDATORY OUTPUT REQUIREMENT ===");
    L.push("The generated material is VISUAL. The final engineered prompt MUST require, as its last section, a complete ready-to-use AI image-generation prompt — required in every case, no exceptions.");
  }
  L.push("","Generate the expert prompt now.");
  return L.join("\n");
}

// ─── PRIMITIVES ───────────────────────────────────────────────────────────────
const inp = {
  width:"100%", boxSizing:"border-box", padding:"10px 14px", fontSize:13,
  borderRadius:8, border:`1.5px solid ${P.sand}`,
  background: P.white, color: P.coal, outline:"none", fontFamily:"inherit",
  transition:"border-color 0.15s",
};
const Inp = (props) => <input style={inp} {...props}
  onFocus={e=>e.target.style.borderColor=P.rust}
  onBlur={e=>e.target.style.borderColor=P.sand}
/>;
const TA = ({rows=2,...p}) => <textarea rows={rows} style={{...inp,resize:"vertical",lineHeight:1.6}} {...p}
  onFocus={e=>e.target.style.borderColor=P.rust}
  onBlur={e=>e.target.style.borderColor=P.sand}
/>;
const Sel = ({options, placeholder="— выбрать —",...p}) => (
  <select style={{...inp, color: p.value ? P.coal : P.faint}} {...p}>
    <option value="">{placeholder}</option>
    {options.map(o=><option key={o} value={o}>{o}</option>)}
  </select>
);
const FL = ({label,children,col=1,hint}) => (
  <div style={{gridColumn:`span ${col}`}}>
    {label && <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:P.muted,marginBottom:5}}>{label}</div>}
    {children}
    {hint && <div style={{fontSize:11,color:P.faint,marginTop:3}}>{hint}</div>}
  </div>
);
const Tag = ({label,selected,accent,onClick}) => (
  <button onClick={onClick} style={{
    padding:"5px 14px", fontSize:12, borderRadius:20, cursor:"pointer",
    border: selected ? `1.5px solid ${accent}` : `1.5px solid ${P.sand}`,
    background: selected ? accent : P.white,
    color: selected ? P.white : P.charcoal,
    fontWeight: selected ? 600 : 400,
    transition:"all 0.13s",
  }}>{label}</button>
);

// Multi-select tag group + free-text "own" field.
// value = { selected: string[], custom: string }
const TagMultiSelect = ({options, value, onChange, accent, placeholder="Своё (через запятую)…"}) => {
  const selected = value?.selected || [];
  const custom   = value?.custom || "";
  const toggle = (opt) => {
    const next = selected.includes(opt) ? selected.filter(x=>x!==opt) : [...selected, opt];
    onChange({ selected: next, custom });
  };
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
        {options.map(o=>(
          <Tag key={o} label={o} selected={selected.includes(o)} accent={accent} onClick={()=>toggle(o)}/>
        ))}
      </div>
      <Inp value={custom} onChange={e=>onChange({ selected, custom:e.target.value })} placeholder={placeholder}/>
    </div>
  );
};

// ─── STEP RAIL ────────────────────────────────────────────────────────────────
const StepRail = ({step, sys, onBack}) => {
  const steps = [
    {label:"Язык",     icon:"ti-language"},
    {label:"Система",  icon:"ti-layout-2"},
    {label:"Категория",icon:"ti-category"},
    {label:"Детали",   icon:"ti-forms"},
    {label:"Промпт",   icon:"ti-sparkles"},
  ];
  const ac = sys === "A" ? P.rust : sys === "B" ? P.rustDark : sys === "C" ? P.rust : P.rust;
  return (
    <div style={{
      background:P.white, borderBottom:`1px solid ${P.sand}`,
      padding:"0 32px", display:"flex", alignItems:"center",
      height:48, gap:0, flexShrink:0, overflowX:"auto",
    }}>
      {step > 0 && (
        <button onClick={onBack} style={{
          display:"flex",alignItems:"center",gap:5,
          padding:"4px 12px 4px 6px", marginRight:16, flexShrink:0,
          borderRadius:6, border:`1px solid ${P.sand}`,
          background:"transparent", color:P.muted, fontSize:12, cursor:"pointer",
        }}>
          <i className="ti ti-arrow-left" style={{fontSize:13}} aria-hidden="true"/>
          Назад
        </button>
      )}
      <div style={{display:"flex",alignItems:"center",gap:0,flex:1}}>
        {steps.map((s,i) => {
          const done   = step > i;
          const active = step === i;
          return (
            <div key={i} style={{display:"flex",alignItems:"center",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,padding:"0 4px"}}>
                <div style={{
                  width:24,height:24,borderRadius:"50%",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:11, fontWeight:700,
                  background: done ? ac : active ? P.rustLight : P.parchment,
                  color: done ? P.white : active ? ac : P.faint,
                  border: active ? `2px solid ${ac}` : "none",
                  transition:"all 0.2s",
                }}>
                  {done
                    ? <i className="ti ti-check" style={{fontSize:11}} aria-hidden="true"/>
                    : <i className={`ti ${s.icon}`} style={{fontSize:11}} aria-hidden="true"/>
                  }
                </div>
                <span style={{
                  fontSize:12,
                  color: active ? ac : done ? P.charcoal : P.faint,
                  fontWeight: active ? 700 : 400,
                  whiteSpace:"nowrap",
                }}>{s.label}</span>
              </div>
              {i < steps.length-1 && (
                <div style={{width:24,height:1,background:done?ac:P.sand,margin:"0 4px",transition:"background 0.3s"}}/>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ─── SECTION HEADER ───────────────────────────────────────────────────────────
const SH = ({icon, children}) => (

    </div>
    <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:P.rust}}>{children}</span>
  </div>
);

// ─── CARD WRAPPER ─────────────────────────────────────────────────────────────
const Card = ({children, style={}}) => (
  <div style={{
    background:P.white, borderRadius:14,
    border:`1px solid ${P.sand}`,

  const curSys = sys==="A"?SYSTEM_A:sys==="B"?SYSTEM_B:sys==="C"?SYSTEM_C:null;

    else if (step===4){setStep(3);}

  };

  const generate = () => {
    setError(""); setResult("");
    const userPart = buildUserMessage({system:sys,category:curCat?.label,subtype:sub,language:lang,fields});
    const finalPrompt = `${buildMasterSystem(sys)}\n\n---\n\n${userPart}`;
    setResult(finalPrompt); setStep(4);
    setTimeout(()=>topRef.current?.scrollIntoView({behavior:"smooth"}),80);
  };

  const copy = () => {navigator.clipboard.writeText(result);setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const reset = () => {setStep(0);setLang(null);setSys(null);setCat(null);setSub("");setResult("");setError("");setFields(f=>({...f,sourceText:"",errorSamples:""}));};

        <SH icon="ti-refresh-alert">Ошибки из речи ученика</SH>
        <TA rows={5} value={fields.errorSamples} onChange={set("errorSamples")}
          placeholder={"Перечислите конкретные ошибки или вставьте транскрипт речи.\n\nПример:\n— путает être/avoir в passé composé\n— не согласует прилагательные по роду\n— говорит «je suis allé» вместо «j'y suis allé»\n— застревает на переходных глаголах"}/>
      </Card>
    )}

    {/* Notes */}
    <Card style={{marginBottom:16}}>
      <SH icon="ti-notes">Дополнительные заметки</SH>
      <TA rows={2} value={fields.additionalNotes} onChange={set("additionalNotes")} placeholder="Что было на прошлом уроке, материалы которых стоит избежать, контекст подготовки к экзамену…"/>
    </Card>

    {error && (
      <div style={{padding:"10px 14px",borderRadius:8,background:"#FCEBEB",border:"1px solid #F09595",color:"#791F1F",fontSize:13,marginBottom:14}}>
        {error}
      </div>
    )}

    <button
      onClick={generate}
      style={{
        width:"100%", padding:"16px",
        borderRadius:12, border:"none",
        background: ac,
        color:P.white, fontSize:15, fontWeight:700,
        letterSpacing:"0.02em", cursor:"pointer",
        transition:"background 0.2s, transform 0.1s",
        display:"flex",alignItems:"center",justifyContent:"center",gap:8,
      }}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-1px)";}}
      onMouseLeave={e=>{e.currentTarget.style.transform="none";}}
    >
      <i className="ti ti-sparkles" style={{fontSize:16}} aria-hidden="true"/>Сгенерировать экспертный промпт
    </button>
  </>);

  // ── STEP 4: RESULT ────────────────────────────────────────────────────────────
  return shell(<>
    {/* Result header */}
    <div style={{
      background:P.rustDeep,borderRadius:14,
      padding:"20px 24px",marginBottom:16,
      display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap",
    }}>
      <div>
        <div style={{
          display:"inline-flex",alignItems:"center",gap:6,
          padding:"3px 10px",borderRadius:20,
          background:"rgba(255,255,255,0.12)",marginBottom:8,
        }}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#6EE7B7"}}/>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.8)"}}>Готово к использованию</span>
        </div>
        <h2 style={{fontSize:18,fontWeight:700,color:P.white,margin:"0 0 3px",fontFamily:"var(--font-display)"}}>Ваш экспертный промпт</h2>
        <p style={{fontSize:11,color:"rgba(255,255,255,0.5)",margin:0}}>{lang.flag} {lang.label} · {curSys.label} · {curCat.label}{sub&&sub!==curCat.label?` · ${sub}`:""}</p>
      </div>
      <div style={{display:"flex",gap:8,flexShrink:0}}>
        <button onClick={()=>setStep(3)} style={{padding:"7px 13px",fontSize:12,borderRadius:8,border:"1px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.7)",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
          <i className="ti ti-edit" style={{fontSize:12}} aria-hidden="true"/>Изменить
        </button>
        <button onClick={reset} style={{padding:"7px 13px",fontSize:12,borderRadius:8,border:"1px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.7)",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
          <i className="ti ti-refresh" style={{fontSize:12}} aria-hidden="true"/>Заново
        </button>
        <button onClick={copy} style={{
          padding:"7px 16px",fontSize:12,borderRadius:8,border:"none",
          background:copied?"#059669":P.rust,
          color:P.white,fontWeight:700,cursor:"pointer",
          transition:"background 0.2s",
          display:"flex",alignItems:"center",gap:5,
        }}>
          <i className={`ti ${copied?"ti-check":"ti-copy"}`} style={{fontSize:12}} aria-hidden="true"/>
          {copied?"Скопировано!":"Копировать промпт"}
        </button>
      </div>
    </div>

    {/* Prompt output */}
    <Card style={{marginBottom:14}}>
      <div style={{
        background:P.parchment,borderRadius:10,
        padding:"18px 20px",
        fontSize:12.5,lineHeight:1.8,color:P.coal,
        whiteSpace:"pre-wrap",fontFamily:"var(--font-mono)",
        maxHeight:460,overflowY:"auto",
        border:`1px solid ${P.sand}`,
      }}>
        {result}
      </div>
    </Card>

    {/* Tip */}
    <div style={{
      display:"flex",alignItems:"flex-start",gap:10,
      padding:"14px 16px",borderRadius:10,
      background:P.white,border:`1px solid ${P.sand}`,
    }}>
      <i className="ti ti-info-circle" style={{fontSize:16,color:P.rust,flexShrink:0,marginTop:1}} aria-hidden="true"/>
      <p style={{fontSize:12,color:P.charcoal,margin:0,lineHeight:1.6}}>
        Вставьте этот промпт в <strong>Claude</strong>, <strong>ChatGPT</strong> или любой другой LLM — и получите полный готовый учебный материал на {lang.label.toLowerCase()} языке в одном ответе, без уточняющих вопросов.
      </p>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
